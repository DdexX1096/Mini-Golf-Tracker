<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Toucan Mini Golf</h2>
</header>

<div class="container">

  <div class="card">
    <h2 id="holeTitle">Hole 1</h2>
    <div id="progressText">1 of 18</div>

    <div class="progress-bg">
      <div id="progressBar" class="progress-fill"></div>
    </div>
  </div>

  <div id="playersGame"></div>

  <!-- NAV BUTTONS -->
  <div style="display:flex; gap:10px; margin-top:20px;">
    <button class="secondary" style="flex:1;" onclick="prevHole()">← Back</button>
    <button style="flex:1;" onclick="nextHole()">Next →</button>
  </div>

  <button class="secondary full" style="margin-top:10px;" onclick="endGame()">
    End Game
  </button>

</div>

<script src="script.js?v=8"></script>
</body>
</html>
